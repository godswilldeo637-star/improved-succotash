<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login - Joke Generator</title>
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Welcome to Joke Generator</h1>
            <p>Sign in with Facebook to save your favorite jokes</p>
        </header>
        
        <main>
            <section class="auth-section">
                <div class="auth-box">
                    <h2>Login</h2>
                    
                    <!-- Facebook Login Button -->
                    <div id="fb-root"></div>
                    <button class="btn btn-facebook" onclick="facebookLogin()">
                        <span class="fb-icon">f</span>
                        Sign in with Facebook
                    </button>
                    
                    <div class="divider">OR</div>
                    
                    <!-- Email Login Form -->
                    <form id="emailLoginForm">
                        <div class="form-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Password:</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Sign In</button>
                    </form>
                    
                    <p class="signup-link">
                        Don't have an account? <a href="#">Sign up</a>
                    </p>
                </div>
            </section>
            
            <div id="userInfo" class="user-info" style="display:none;">
                <h3>Welcome, <span id="userName"></span>!</h3>
                <img id="userPhoto" src="" alt="Profile Photo" class="profile-photo">
                <button onclick="logout()" class="btn btn-danger">Logout</button>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
        </main>
        
        <footer>
            <p>&copy; 2025 Joke Generator. Secure Authentication.</p>
        </footer>
    </div>
    
    <!-- Facebook SDK -->
    <script async defer crossorigin="anonymous" 
        src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v18.0&appId=YOUR_FACEBOOK_APP_ID" 
        nonce="YOUR_NONCE"></script>
    
    <script src="auth-script.js"></script>
</body>
</html>
